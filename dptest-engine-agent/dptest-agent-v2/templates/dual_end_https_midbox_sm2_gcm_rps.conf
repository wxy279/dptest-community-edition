dptest_thread_config = {
	triffic_worker_config = [1];
	crypto_worker_config = [2];
};

dptest_client_config = {
    clients = (
	{
		application = {
			name = "dual_end_https_midbox_sm2_gcm_rps";
			flows = (
				{
					protocol = {
						protocol_name = "HTTP";
						protocol_parameters = {
							l4_transport = "TCP";
							access_port = {{ACCESS_PORT}};
							listen_port = {{LISTEN_PORT}};
							sctp_tunneling_port = 0;
							sctp_checksum_type = "ADLER32";
							client_profile = "{{CLIENT_PROFILE}}";
							server_profile = "{{SERVER_PROFILE}}";
							http_version_number = "HTTP/{{HTTP_VERSION}}";
							server_host_name = "";
							number_of_random_cookies = 0;
							min_length_of_each_random_cookie = 0;
							max_length_of_each_random_cookie = 0;
							random_cookie_value_persistence = true;
							enable_cookie_persistence = {{ENABLE_COOKIE_PERSISTENCE}};
							enable_server_cookie = {{ENABLE_SERVER_COOKIE}};
							server_create_cookie_frequency = 60;
							server_update_cookie_frequency = 40;
							server_delete_cookie_frequency = 40;
							max_redirects = {{MAX_REDIRECTS}};
							follow_redirects = {{FOLLOW_REDIRECTS}};
							redirect_preserve_method = false;
							redirect_preserve_body = false;
							record_redirect_chain = false;
							redirect_preserve_headers = "";
							response_latency_mode = "{{RESPONSE_LATENCY_MODE}}";
							response_latency = {{RESPONSE_LATENCY}};
							response_latency_mean = {{RESPONSE_LATENCY_MEAN}};
							response_latency_standard_deviation = {{RESPONSE_LATENCY_STANDARD_DEVIATION}};
						};
					};
					target_hosts = (
						{ base_addr = "{{TARGET_HOST}}"; count = 1; }
					);
				}
			);
			actions = (
				{ flow_id = 0; action_name = "StartTLS"; source = "client";
					action_parameters = {
						transaction_flag = "start";
						min_version = "{{TLS_MIN_VERSION}}";
						max_version = "{{TLS_MAX_VERSION}}";
						first_cipher = "{{TLS_CIPHER}}";
						ec_group = "{{TLS_EC_GROUP}}";
						signature_hash_algorithms = "";
						session_reuse = 0;
						resume_expire = 0;
						sni = "{{SNI_HOST}}";
						send_close_notify = 1;
						server_cert_verify_mode = 0;
						server_common_name = "";
						client_auth_enable = 0;
						certfile_name = "{{CERTFILE_NAME}}";
						keyfile_name = "{{KEYFILE_NAME}}";
						signature_certfile_name = "{{SIGNATURE_CERTFILE_NAME}}";
						signature_keyfile_name = "{{SIGNATURE_KEYFILE_NAME}}";
						icafile_name = "{{ICAFILE_NAME}}";
					};
				},
				{ flow_id = 0; action_name = "GET"; source = "client";
					action_parameters = {
						transaction_flag = "start";
						proxy_mode = "off";
						request_path = "{{REQUEST_PATH}}";
						url_escape = false;
						enable_persistent_http_sessions = "{{CLIENT_PERSISTENT}}";
						custom_host_header = "{{HOST_HEADER}}";
						custom_accept_header = "";
						custom_encoding_header = "";
						custom_language_header = "";
						custom_user_agent = "";
						custom_header_name = "{{CUSTOM_HEADER_NAME}}";
						custom_header_value = "{{CUSTOM_HEADER_VALUE}}";
					};
				},
				{ flow_id = 0; action_name = "Response 200 (OK)"; source = "server";
					action_parameters = {
						transaction_flag = "continue";
						http_compression = "{{RESPONSE_HTTP_COMPRESSION}}";
						enable_persistent = "{{SERVER_ENABLE_PERSISTENT}}";
						enable_content_md5 = "{{RESPONSE_ENABLE_CONTENT_MD5}}";
						enable_chunked_encoding = "{{RESPONSE_ENABLE_CHUNKED_ENCODING}}";
						content_type = "{{RESPONSE_CONTENT_TYPE}}";
						http_chunk_response_size = {{RESPONSE_HTTP_CHUNK_RESPONSE_SIZE}};
						response_server_name = "{{RESPONSE_SERVER_NAME}}";
						file_generator_configuration = "{{RESPONSE_FILE_GENERATOR_CONFIGURATION}}";
						file_generator = "{{RESPONSE_FILE_GENERATOR}}";
						keyword_list = "{{RESPONSE_KEYWORD_LIST}}";
						random_filename_for_response = "{{RESPONSE_RANDOM_FILENAME_FOR_RESPONSE}}";
						random_response_min_length = {{RESPONSE_RANDOM_RESPONSE_MIN_LENGTH}};
						random_response_max_length = {{RESPONSE_RANDOM_RESPONSE_MAX_LENGTH}};
						file_response_data = "{{FILE_RESPONSE_DATA}}";
						directory_for_response = "{{DIRECTORY_FOR_RESPONSE}}";
						string_response_data = "{{STRING_RESPONSE_DATA}}";
					};
				},
				{ flow_id = 0; action_name = "Close"; source = "client";
					action_parameters = {
						transaction_flag = "continue";
						fin_or_rst = "{{TCP_CLOSE_MODE}}";
						close_flow_id = 0;
					};
				}
			);
		};

		subnet = {
			name = "subnet1";
			base_addr = "192.168.65.240";
			count = 1;
			network = "192.168.65.0";
			netmask = 24;
			default_gw = "192.168.65.1";
		};

		interface = {
			interface_id = 0;
			gratuitous_arp = true;
			vr_enabled = 0;
			vr_addrs = (
				{ address = "192.168.65.65"; netmask = 24; vlan_enable = 0; inner_vlan_id = 0; }
			);
		};

		load = {
			stress_type = "run";
			stress_mode = "Simusers";
			percentage = 33.3;
			load_constraints = {
				max_incoming_bandwidth = -1;
				max_simusers_born = -1;
				max_simusers_born_rate = -1;
				max_living_simusers = -1;
				max_connection_attemps = 9223372036854775807;
				max_connection_rate = -1;
				max_open_connections = -1;
				max_connection_errors_percent = -1;
				max_transaction_attaemps = -1;
				max_transaction_rate = -1;
				max_transaction_errors_percet = -1;
			};
			stress_stages = (
				{ stage = "delay"; repetitions = 1; height = 0; ramp_time = 0; steady_time = 1},
				{ stage = "steady State"; repetitions = 1; height = 10; ramp_time = 2; steady_time = 120}
			);
		};
	}
    );

    servers = {
    };
